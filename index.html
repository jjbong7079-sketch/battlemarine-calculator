<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>배틀마린 A군 계산기</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0b5ed7">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>배틀마린 A군 계산기</h1>

<div class="card">

<label>거리</label>

<input
type="number"
id="distance"
placeholder="거리 입력"
min="1"
max="999">

</div>

<div class="card">

<label>조류</label>

<div class="current-box">

<button id="minus">－</button>

<span id="currentFlow">6</span>

<button id="plus">＋</button>

</div>

</div>

<div class="result">

<h2>역졸</h2>

<div id="reverseValue">-</div>

</div>

<div class="result">

<h2>순졸</h2>

<div id="normalValue">-</div>

</div>

</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('./service-worker.js');
}
</script>
  
<script src="app.js"></script>

</body>

</html>
